# Manual deploy: run from Actions → this workflow → Run workflow → pick app.
# Documentation: docs/others/VERCEL-DEPLOY.md
#
# Prerequisite (Vercel Dashboard, per project):
#   Settings → Git → Deploy Hooks → create hook for branch `main` (or your production branch).
#
# Prerequisite (GitHub repo):
#   Settings → Secrets and variables → Actions → add one secret per app (full hook URL):
#     VERCEL_DEPLOY_HOOK_STORYBOOK
#     VERCEL_DEPLOY_HOOK_PORTFOLIO
#     VERCEL_DEPLOY_HOOK_DOCUMENTS
#     VERCEL_DEPLOY_HOOK_ASSISTANT_AI
#     VERCEL_DEPLOY_HOOK_MCP
#
# Optional: disable automatic Production deployments on each Vercel project if you only want deploys via this workflow.

name: Manual Vercel deploy

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      app:
        description: App to build and deploy on Vercel
        type: choice
        required: true
        options:
          - storybook
          - portfolio
          - documents
          - assistant-ai
          - mcp

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy Hook
        env:
          APP: ${{ inputs.app }}
          VERCEL_DEPLOY_HOOK_STORYBOOK: ${{ secrets.VERCEL_DEPLOY_HOOK_STORYBOOK }}
          VERCEL_DEPLOY_HOOK_PORTFOLIO: ${{ secrets.VERCEL_DEPLOY_HOOK_PORTFOLIO }}
          VERCEL_DEPLOY_HOOK_DOCUMENTS: ${{ secrets.VERCEL_DEPLOY_HOOK_DOCUMENTS }}
          VERCEL_DEPLOY_HOOK_ASSISTANT_AI: ${{ secrets.VERCEL_DEPLOY_HOOK_ASSISTANT_AI }}
          VERCEL_DEPLOY_HOOK_MCP: ${{ secrets.VERCEL_DEPLOY_HOOK_MCP }}
        run: |
          set -euo pipefail
          case "$APP" in
            storybook)    HOOK_URL="$VERCEL_DEPLOY_HOOK_STORYBOOK" ;;
            portfolio)    HOOK_URL="$VERCEL_DEPLOY_HOOK_PORTFOLIO" ;;
            documents)    HOOK_URL="$VERCEL_DEPLOY_HOOK_DOCUMENTS" ;;
            assistant-ai) HOOK_URL="$VERCEL_DEPLOY_HOOK_ASSISTANT_AI" ;;
            mcp)          HOOK_URL="$VERCEL_DEPLOY_HOOK_MCP" ;;
            *) echo "Unknown app: $APP"; exit 1 ;;
          esac
          if [ -z "$HOOK_URL" ]; then
            echo "Missing secret for app: $APP (configure VERCEL_DEPLOY_HOOK_* in repo Actions secrets)"
            exit 1
          fi
          curl -fsS -X POST "$HOOK_URL"
          echo "Deploy hook triggered for $APP"
